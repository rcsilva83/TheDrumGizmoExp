name: build

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            ninja-build \
            g++ \
            gettext \
            libx11-dev \
            libxext-dev \
            libsndfile1-dev \
            libjack-jackd2-dev \
            libasound2-dev \
            libsmf-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DDG_ENABLE_TESTS=ON \
            -DDG_WITH_NLS=OFF \
            -DDG_ENABLE_LV2=OFF \
            -DDG_ENABLE_VST=OFF \
            -DDG_GUI_BACKEND=x11

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-cmake
          path: |
            build/Testing/**/Test.xml
            build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  coverage:
    name: Coverage reports
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            ninja-build \
            g++ \
            python3 \
            python3-venv \
            gettext \
            libx11-dev \
            libxext-dev \
            libsndfile1-dev \
            libjack-jackd2-dev \
            libasound2-dev \
            libsmf-dev

      - name: Configure with coverage flags
        run: |
          cmake -S . -B build-coverage \
            -G Ninja \
            -DDG_ENABLE_TESTS=ON \
            -DDG_WITH_NLS=OFF \
            -DDG_ENABLE_LV2=OFF \
            -DDG_ENABLE_VST=OFF \
            -DDG_GUI_BACKEND=x11 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS='--coverage -O0 -g' \
            -DCMAKE_CXX_FLAGS='--coverage -O0 -g' \
            -DCMAKE_EXE_LINKER_FLAGS='--coverage' \
            -DCMAKE_SHARED_LINKER_FLAGS='--coverage'

      - name: Build
        run: cmake --build build-coverage -j"$(nproc)"

      - name: Run tests
        run: ctest --test-dir build-coverage --output-on-failure

      - name: Prepare coverage output paths
        run: |
          rm -f a-conftest.gcno a-conftest.gcda conftest.gcno conftest.gcda
          mkdir -p coverage

      - name: Install gcovr via pip
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip gcovr==8.6

      - name: Check gcovr version
        run: .venv/bin/python -m gcovr --version

      - name: Generate coverage reports
        run: |
          .venv/bin/python -m gcovr \
            --root . \
            --object-directory build-coverage \
            --verbose \
            -j 1 \
            --gcov-ignore-parse-errors=all \
            --gcov-ignore-errors=source_not_found \
            --filter '(^|.*/)(src|dggui|plugingui|plugin|drumgizmo|test)/' \
            --exclude '.*/a-conftest\..*' \
            --exclude '.*/conftest\..*' \
            --xml-pretty \
            --output coverage.xml

          .venv/bin/python -m gcovr \
            --root . \
            --object-directory build-coverage \
            --verbose \
            -j 1 \
            --gcov-ignore-parse-errors=all \
            --gcov-ignore-errors=source_not_found \
            --filter '(^|.*/)(src|dggui|plugingui|plugin|drumgizmo|test)/' \
            --exclude '.*/a-conftest\..*' \
            --exclude '.*/conftest\..*' \
            --html-details \
            --output coverage/index.html

      - name: Publish coverage summary
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage.xml").getroot()

          def as_int(value):
            try:
              return int(value)
            except (TypeError, ValueError):
              return 0

          def as_percent(covered, total, rate):
            if total > 0:
              return covered / total * 100
            try:
              return float(rate) * 100
            except (TypeError, ValueError):
              return 0.0

          line_covered = as_int(root.attrib.get("lines-covered"))
          line_total = as_int(root.attrib.get("lines-valid"))
          branch_covered = as_int(root.attrib.get("branches-covered"))
          branch_total = as_int(root.attrib.get("branches-valid"))

          line_percent = as_percent(line_covered, line_total, root.attrib.get("line-rate"))
          branch_percent = as_percent(branch_covered, branch_total, root.attrib.get("branch-rate"))

          summary = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary, "a", encoding="utf-8") as handle:
            handle.write("## Coverage reports\n\n")
            handle.write("| Metric | Covered | Total | Coverage |\n")
            handle.write("| --- | ---: | ---: | ---: |\n")
            handle.write(f"| Lines | {line_covered} | {line_total} | {line_percent:.2f}% |\n")
            handle.write(f"| Branches | {branch_covered} | {branch_total} | {branch_percent:.2f}% |\n\n")
            handle.write("Detailed HTML and XML reports are available in the `coverage-reports` artifact.\n")
          PY

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage/

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install static analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-format

      - name: Run cppcheck and clang-format
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}...${{ github.sha }}"
          else
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              range="${{ github.event.before }}...${{ github.sha }}"
            else
              range="HEAD~1...HEAD"
            fi
          fi

          mapfile -t files < <(git diff --name-only --diff-filter=ACMRTUXB "$range" -- '*.c' '*.cc' '*.cpp' '*.h' '*.hh' '*.hpp')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C/C++ file changes detected; skipping static analysis."
            exit 0
          fi

          c_files=()
          cpp_files=()
          for file in "${files[@]}"; do
            case "$file" in
              *.c)
                c_files+=("$file")
                ;;
              *)
                cpp_files+=("$file")
                ;;
            esac
          done

          if [ "${#cpp_files[@]}" -gt 0 ]; then
            cppcheck \
              --error-exitcode=1 \
              --enable=warning,style,performance,portability \
              --language=c++ \
              --std=c++11 \
              --suppress=missingIncludeSystem \
              --suppress=toomanyconfigs \
              --suppress=unusedStructMember \
              --inline-suppr \
              "${cpp_files[@]}"
          fi

          if [ "${#c_files[@]}" -gt 0 ]; then
            cppcheck \
              --error-exitcode=1 \
              --enable=warning,style,performance,portability \
              --language=c \
              --std=c11 \
              --suppress=missingIncludeSystem \
              --suppress=toomanyconfigs \
              --suppress=unusedStructMember \
              --inline-suppr \
              "${c_files[@]}"
          fi

          clang-format --dry-run --Werror "${files[@]}"
  sonar:
    name: Sonar
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v4
      - name: Run Build Wrapper
        run: |
          mkdir build
          cmake -S . -B build
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} cmake --build build/ --config Release
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.compile-commands="${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json"
            
  linux-binary:
    name: Linux binary
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            ninja-build \
            g++ \
            gettext \
            libx11-dev \
            libxext-dev \
            libsndfile1-dev \
            libjack-jackd2-dev \
            libasound2-dev \
            libsmf-dev

      - name: Configure and build
        run: |
          cmake -S . -B build-release \
            -G Ninja \
            -DDG_ENABLE_TESTS=OFF \
            -DDG_WITH_NLS=OFF \
            -DDG_ENABLE_LV2=OFF \
            -DDG_ENABLE_VST=OFF \
            -DDG_GUI_BACKEND=x11
          cmake --build build-release -j"$(nproc)"

      - name: Package binaries
        run: |
          mkdir -p dist/bin
          cp build-release/drumgizmo dist/bin/drumgizmo
          cp build-release/dgvalidator dist/bin/dgvalidator

          tar -czf drumgizmo-linux-binaries.tar.gz -C dist/bin drumgizmo dgvalidator

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/bin/drumgizmo
            dist/bin/dgvalidator
            drumgizmo-linux-binaries.tar.gz
