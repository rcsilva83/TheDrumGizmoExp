name: build

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            ninja-build \
            g++ \
            gettext \
            libx11-dev \
            libxext-dev \
            libglib2.0-dev \
            libjack-jackd2-dev \
            libasound2-dev

      - name: Configure
        run: |
          cmake -S . -B build-coverage \
            -G Ninja \
            -DDG_ENABLE_TESTS=ON \
            -DDG_WITH_NLS=OFF \
            -DDG_ENABLE_LV2=OFF \
            -DDG_ENABLE_VST=OFF \
            -DDG_GUI_BACKEND=x11 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS='--coverage -O0 -g' \
            -DCMAKE_CXX_FLAGS='--coverage -O0 -g' \
            -DCMAKE_EXE_LINKER_FLAGS='--coverage' \
            -DCMAKE_SHARED_LINKER_FLAGS='--coverage'

      - name: Build
        run: cmake --build build-coverage -j"$(nproc)"

      - name: Run tests
        run: ctest --test-dir build-coverage --output-on-failure

      - name: Upload build artifacts for coverage
        uses: actions/upload-artifact@v7
        with:
          name: build-coverage-artifacts
          path: |
            build-coverage/**/*.gcno
            build-coverage/**/*.gcda

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs-cmake
          path: |
            build-coverage/Testing/**/Test.xml
            build-coverage/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  coverage:
    name: Coverage reports
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ \
            python3 \
            python3-venv

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-coverage-artifacts
          path: build-coverage/

      - name: Prepare coverage output paths
        run: |
          rm -f a-conftest.gcno a-conftest.gcda conftest.gcno conftest.gcda
          mkdir -p coverage

      - name: Install gcovr via pip
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip gcovr==8.6

      - name: Check gcovr version
        run: .venv/bin/python -m gcovr --version

      - name: Generate coverage reports
        run: |
          .venv/bin/python -m gcovr \
            --root . \
            --object-directory build-coverage \
            --verbose \
            -j 1 \
            --gcov-ignore-parse-errors=all \
            --gcov-ignore-errors=source_not_found \
            --filter '^(src|dggui|plugingui|plugin|drumgizmo|test)/' \
            --exclude '.*/a-conftest\..*' \
            --exclude '.*/conftest\..*' \
            --xml-pretty \
            --output coverage.xml

          .venv/bin/python -m gcovr \
            --root . \
            --object-directory build-coverage \
            --verbose \
            -j 1 \
            --gcov-ignore-parse-errors=all \
            --gcov-ignore-errors=source_not_found \
            --filter '^(src|dggui|plugingui|plugin|drumgizmo|test)/' \
            --exclude '.*/a-conftest\..*' \
            --exclude '.*/conftest\..*' \
            --sonarqube \
            --output coverage-sonar.xml

          .venv/bin/python -m gcovr \
            --root . \
            --object-directory build-coverage \
            --verbose \
            -j 1 \
            --gcov-ignore-parse-errors=all \
            --gcov-ignore-errors=source_not_found \
            --filter '^(src|dggui|plugingui|plugin|drumgizmo|test)/' \
            --exclude '.*/a-conftest\..*' \
            --exclude '.*/conftest\..*' \
            --html-details \
            --output coverage/index.html

      - name: Publish coverage summary
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage.xml").getroot()

          def as_int(value):
            try:
              return int(value)
            except (TypeError, ValueError):
              return 0

          def as_percent(covered, total, rate):
            if total > 0:
              return covered / total * 100
            try:
              return float(rate) * 100
            except (TypeError, ValueError):
              return 0.0

          line_covered = as_int(root.attrib.get("lines-covered"))
          line_total = as_int(root.attrib.get("lines-valid"))
          branch_covered = as_int(root.attrib.get("branches-covered"))
          branch_total = as_int(root.attrib.get("branches-valid"))

          line_percent = as_percent(line_covered, line_total, root.attrib.get("line-rate"))
          branch_percent = as_percent(branch_covered, branch_total, root.attrib.get("branch-rate"))

          summary = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary, "a", encoding="utf-8") as handle:
            handle.write("## Coverage reports\n\n")
            handle.write("| Metric | Covered | Total | Coverage |\n")
            handle.write("| --- | ---: | ---: | ---: |\n")
            handle.write(f"| Lines | {line_covered} | {line_total} | {line_percent:.2f}% |\n")
            handle.write(f"| Branches | {branch_covered} | {branch_total} | {branch_percent:.2f}% |\n\n")
            handle.write("Detailed HTML and XML reports are available in the `coverage-reports` artifact.\n")
          PY

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            coverage.xml
            coverage-sonar.xml
            coverage/

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install static analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cppcheck \
            clang-format \
            clang-tidy \
            cmake \
            ninja-build \
            pkg-config \
            gettext \
            libx11-dev \
            libxext-dev \
            libglib2.0-dev \
            libsndfile1-dev \
            libjack-jackd2-dev \
            libasound2-dev \
            libsmf-dev

      - name: Cache CPM sources
        uses: actions/cache@v5
        with:
          path: ~/.cpm-cache
          key: cpm-${{ hashFiles('cmake/dependencies.cmake') }}
          restore-keys: |
            cpm-

      - name: Configure (generate compile_commands.json for clang-tidy)
        env:
          CPM_SOURCE_CACHE: ~/.cpm-cache
        run: |
          cmake -S . -B build-tidy \
            -G Ninja \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DDG_ENABLE_TESTS=ON \
            -DDG_WITH_NLS=ON \
            -DDG_ENABLE_LV2=OFF \
            -DDG_ENABLE_VST=OFF \
            -DDG_GUI_BACKEND=x11

      - name: Run cppcheck, clang-format, and clang-tidy
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}...${{ github.sha }}"
          else
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              range="${{ github.event.before }}...${{ github.sha }}"
            else
              range="HEAD~1...HEAD"
            fi
          fi

          mapfile -t files < <(git diff --name-only --diff-filter=ACMRTUXB "$range" -- '*.c' '*.cc' '*.cpp' '*.h' '*.hh' '*.hpp')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No C/C++ file changes detected; skipping static analysis."
            exit 0
          fi

          c_files=()
          cpp_files=()
          for file in "${files[@]}"; do
            case "$file" in
              *.c)
                c_files+=("$file")
                ;;
              *)
                cpp_files+=("$file")
                ;;
            esac
          done

          if [ "${#cpp_files[@]}" -gt 0 ]; then
            cppcheck \
              --error-exitcode=1 \
              --enable=warning,style,performance,portability \
              --language=c++ \
              --std=c++11 \
              --suppress=missingIncludeSystem \
              --suppress=toomanyconfigs \
              --suppress=unusedStructMember \
              --inline-suppr \
              "${cpp_files[@]}"
          fi

          if [ "${#c_files[@]}" -gt 0 ]; then
            cppcheck \
              --error-exitcode=1 \
              --enable=warning,style,performance,portability \
              --language=c \
              --std=c11 \
              --suppress=missingIncludeSystem \
              --suppress=toomanyconfigs \
              --suppress=unusedStructMember \
              --inline-suppr \
              "${c_files[@]}"
          fi

          clang-format --dry-run --Werror "${files[@]}"

          source_files=()
          for file in "${files[@]}"; do
            case "$file" in
              *.h|*.hh|*.hpp) ;;
              *)
                if python3 - "$file" <<'PY'
                  import json
                  import os
                  import sys

                  target = sys.argv[1]
                  with open("build-tidy/compile_commands.json", "r", encoding="utf-8") as f:
                      commands = json.load(f)

                  for entry in commands:
                      file_path = entry.get("file", "")
                      if file_path == target or os.path.normpath(file_path).endswith("/" + target):
                          raise SystemExit(0)

                  raise SystemExit(1)
                PY
                then
                  source_files+=("$file")
                else
                  echo "Skipping clang-tidy for $file (not present in compile_commands.json)"
                fi
                ;;
            esac
          done

          if [ "${#source_files[@]}" -gt 0 ]; then
            clang-tidy -p build-tidy "${source_files[@]}"
          fi
  sonar:
    name: Sonar
    runs-on: ubuntu-latest
    needs: coverage
    permissions:
      security-events: write
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            ninja-build \
            g++ \
            gettext \
            libx11-dev \
            libxext-dev \
            libglib2.0-dev \
            libjack-jackd2-dev \
            libasound2-dev
      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v6
      - name: Run Build Wrapper
        run: |
          mkdir build
          cmake -S . -B build \
            -DDG_ENABLE_TESTS=ON \
            -DDG_WITH_NLS=OFF \
            -DDG_ENABLE_LV2=OFF \
            -DDG_ENABLE_VST=OFF \
            -DDG_GUI_BACKEND=x11
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} cmake --build build/ --config Release
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
            --define sonar.coverageReportPaths=coverage-sonar.xml

      - name: Generate SARIF from SonarCloud issues
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          python3 - <<'PY'
          import base64, json, os, sys, urllib.request, urllib.parse

          TOKEN       = os.environ["SONAR_TOKEN"]
          PROJECT_KEY = "rcsilva83_TheDrumGizmoExp"
          BASE_URL    = "https://sonarcloud.io"
          creds       = base64.b64encode(f"{TOKEN}:".encode()).decode()

          def fetch(path):
            req = urllib.request.Request(f"{BASE_URL}{path}")
            req.add_header("Authorization", f"Basic {creds}")
            with urllib.request.urlopen(req) as r:
              return json.loads(r.read())

          issues = []
          page = 1
          while True:
            params = urllib.parse.urlencode({
              "componentKeys": PROJECT_KEY,
              "resolved": "false",
              "ps": 500,
              "p": page,
            })
            data = fetch(f"/api/issues/search?{params}")
            issues.extend(data["issues"])
            total = data["paging"]["total"]
            if page * 500 >= total:
              break
            page += 1

          print(f"Fetched {len(issues)} issues from SonarCloud", file=sys.stderr)

          def sarif_level(issue):
            for impact in issue.get("impacts", []):
              s = impact.get("severity", "")
              if s in ("BLOCKER", "HIGH"):
                return "error"
              if s == "MEDIUM":
                return "warning"
            sev = issue.get("severity", "MAJOR")
            if sev in ("BLOCKER", "CRITICAL"):
              return "error"
            if sev == "MAJOR":
              return "warning"
            return "note"

          rules_map = {}
          results   = []
          prefix    = PROJECT_KEY + ":"

          for issue in issues:
            rule_key  = issue.get("rule", "unknown")
            component = issue.get("component", "")
            file_path = component[len(prefix):] if component.startswith(prefix) else component
            line      = issue.get("line") or 1
            message   = issue.get("message", "")

            if rule_key not in rules_map:
              rules_map[rule_key] = {
                "id": rule_key,
                "shortDescription": {"text": rule_key},
                "helpUri": f"{BASE_URL}/coding_rules?open={urllib.parse.quote(rule_key)}",
              }

            results.append({
              "ruleId":    rule_key,
              "message":   {"text": message},
              "locations": [{
                "physicalLocation": {
                  "artifactLocation": {"uri": file_path, "uriBaseId": "%SRCROOT%"},
                  "region":           {"startLine": line},
                },
              }],
              "level": sarif_level(issue),
            })

          sarif = {
            "version": "2.1.0",
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "runs": [{
              "tool": {
                "driver": {
                  "name":            "SonarCloud",
                  "informationUri":  BASE_URL,
                  "rules":           list(rules_map.values()),
                },
              },
              "results": results,
            }],
          }

          with open("sonarcloud.sarif", "w") as f:
            json.dump(sarif, f, indent=2)
          print("SARIF written to sonarcloud.sarif", file=sys.stderr)
          PY

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sonarcloud.sarif
          category: sonarcloud

  linux-binary:
    name: Linux binary
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            ninja-build \
            g++ \
            gettext \
            libx11-dev \
            libxext-dev \
            libglib2.0-dev \
            libjack-jackd2-dev \
            libasound2-dev

      - name: Configure and build
        run: |
          cmake -S . -B build-release \
            -G Ninja \
            -DDG_ENABLE_TESTS=OFF \
            -DDG_WITH_NLS=OFF \
            -DDG_ENABLE_LV2=OFF \
            -DDG_ENABLE_VST=OFF \
            -DDG_GUI_BACKEND=x11
          cmake --build build-release -j"$(nproc)"

      - name: Package binaries
        run: |
          mkdir -p dist/bin
          cp build-release/drumgizmo dist/bin/drumgizmo
          cp build-release/dgvalidator dist/bin/dgvalidator

          tar -czf drumgizmo-linux-binaries.tar.gz -C dist/bin drumgizmo dgvalidator

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v7
        with:
          name: linux-binaries
          path: |
            dist/bin/drumgizmo
            dist/bin/dgvalidator
            drumgizmo-linux-binaries.tar.gz
